with-expecter: true
dir: "{{.InterfaceDir}}/mocks"
filename: "mock_{{.InterfaceNameSnake}}.go"
outpkg: "mocks"
mockname: "{{.InterfaceName}}"
resolve-type-alias: False
issue-845-fix: True

packages:
  github.com/danilfaer/golang/inventory/internal/service:
    config:
      include-regex: ".*Service"
  github.com/danilfaer/golang/inventory/internal/repository:
    config:
      include-regex: ".*Repository"
  github.com/danilfaer/golang/order/internal/service:
    config:
      include-regex: ".*Service"
  github.com/danilfaer/golang/order/internal/repository:
    config:
      include-regex: ".*Repository"
  github.com/danilfaer/golang/order/internal/client/grpc:
    config:
       include-regex: ".*Client"
  github.com/danilfaer/golang/payment/internal/service:
    config:
      include-regex: ".*Service"